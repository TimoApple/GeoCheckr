name: Build GeoCheckr APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'GeoCheckr_Material/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
      
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
      
      - name: Build Debug APK (für Emulator)
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"
      
      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: geocheckr-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: geocheckr-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## 📱 APK Build erfolgreich!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Debug APK:** Für Emulator Testing" >> $GITHUB_STEP_SUMMARY
          echo "- **Release APK:** Für Veröffentlichung" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download unter: Actions → Run → Artifacts" >> $GITHUB_STEP_SUMMARY
