name: Build GeoCheckr APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'GeoCheckr_Material/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
      
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
      
      - name: Add Street View native files
        run: |
          # Copy Kotlin source files
          SRC="android/app/src/main/java/com/geocheckr/app"
          mkdir -p "$SRC"
          cp native/StreetViewActivity.kt "$SRC/"
          cp native/StreetViewModule.kt "$SRC/"
          cp native/StreetViewPackage.kt "$SRC/"
          
          # Copy layout XML
          mkdir -p android/app/src/main/res/layout
          cp native/activity_street_view.xml android/app/src/main/res/layout/
          
          # Add play-services-maps to build.gradle
          sed -i '/dependencies {/a\    implementation '\''com.google.android.gms:play-services-maps:19.0.0'\''' android/app/build.gradle
          
          # Add API key + Activity to AndroidManifest.xml
          sed -i '/<application/a\    <meta-data android:name="com.google.android.geo.API_KEY" android:value="AIzaSyCl3ogHqguF1QcwhyHdvJmUkbgx3bpKLJI"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/a\    <activity android:name=".StreetViewActivity" android:theme="@style/Theme.AppCompat.NoActionBar" android:exported="false"/>' android/app/src/main/AndroidManifest.xml
          
          # Register package in MainApplication.kt
          sed -i '/PackageList(this).packages.apply {/a\              add(StreetViewPackage())' android/app/src/main/java/com/geocheckr/app/MainApplication.kt
          sed -i '1s/^/import com.geocheckr.app.StreetViewPackage\n/' android/app/src/main/java/com/geocheckr/app/MainApplication.kt
      
      - name: Build Release APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx2048m" 2>&1 | tail -80
      
      - name: Find and copy APK
        run: |
          echo "=== All APKs ==="
          find . -name "*.apk" -type f 2>/dev/null
          mkdir -p $GITHUB_WORKSPACE/apk-output
          find android -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/apk-output/ \;
          ls -la $GITHUB_WORKSPACE/apk-output/
          echo "APK_PATH=$GITHUB_WORKSPACE/apk-output" >> $GITHUB_ENV

      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: geocheckr-release-apk
          path: apk-output/

      - name: Summary
        run: |
          echo "## 📱 Standalone APK Build!" >> $GITHUB_STEP_SUMMARY
          echo "Kein Dev-Server nötig - direkt installierbar!" >> $GITHUB_STEP_SUMMARY
