<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="center" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#a6d700" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#3340ca" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#111225" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="b"><rect width="800" height="600" rx="0"/></clipPath>
  </defs>
  <rect width="800" height="600" fill="#111225"/>
  <rect width="800" height="600" fill="url(#center)"/>
  <g clip-path="url(#b)">
    
    <!-- Radial contour rings — from center peak -->
    <g stroke="#3340ca" fill="none" opacity="0.15">
      <ellipse cx="400" cy="280" rx="30" ry="20" stroke-width="1.5"/>
      <ellipse cx="400" cy="280" rx="60" ry="40" stroke-width="1.2"/>
      <ellipse cx="400" cy="280" rx="100" ry="65" stroke-width="1"/>
      <ellipse cx="400" cy="280" rx="150" ry="95" stroke-width="0.8"/>
      <ellipse cx="400" cy="280" rx="210" ry="130" stroke-width="0.6"/>
      <ellipse cx="400" cy="280" rx="280" ry="170" stroke-width="0.5"/>
      <ellipse cx="400" cy="280" rx="360" ry="215" stroke-width="0.4"/>
      <ellipse cx="400" cy="280" rx="450" ry="265" stroke-width="0.3"/>
    </g>
    
    <!-- Secondary peak — top right -->
    <g stroke="#bdc2ff" fill="none" opacity="0.08">
      <ellipse cx="650" cy="180" rx="25" ry="18" stroke-width="1"/>
      <ellipse cx="650" cy="180" rx="55" ry="38" stroke-width="0.8"/>
      <ellipse cx="650" cy="180" rx="90" ry="60" stroke-width="0.6"/>
      <ellipse cx="650" cy="180" rx="130" ry="85" stroke-width="0.4"/>
    </g>
    
    <!-- Valley depression — bottom left -->
    <g stroke="#a6d700" fill="none" opacity="0.06">
      <ellipse cx="150" cy="420" rx="20" ry="15" stroke-width="0.8" stroke-dasharray="4,3"/>
      <ellipse cx="150" cy="420" rx="45" ry="35" stroke-width="0.6" stroke-dasharray="4,3"/>
      <ellipse cx="150" cy="420" rx="75" ry="55" stroke-width="0.4" stroke-dasharray="4,3"/>
    </g>
    
    <!-- Ridge connecting peaks -->
    <g stroke="#3340ca" fill="none" opacity="0.1">
      <path d="M400,280 Q500,240 650,180" stroke-width="1"/>
      <path d="M400,280 Q320,350 150,420" stroke-width="0.8"/>
      <path d="M400,280 Q480,340 600,380" stroke-width="0.6"/>
    </g>
    
    <!-- Peak markers -->
    <g fill="#a6d700" opacity="0.3">
      <circle cx="400" cy="280" r="5"/>
      <circle cx="650" cy="180" r="3"/>
    </g>
    <g fill="#3340ca" opacity="0.2">
      <circle cx="150" cy="420" r="3"/>
      <circle cx="600" cy="380" r="2"/>
    </g>
    
    <!-- Coordinate grid -->
    <g stroke="#bdc2ff" stroke-width="0.2" opacity="0.03">
      <line x1="0" y1="150" x2="800" y2="150"/>
      <line x1="0" y1="300" x2="800" y2="300"/>
      <line x1="0" y1="450" x2="800" y2="450"/>
      <line x1="200" y1="0" x2="200" y2="600"/>
      <line x1="400" y1="0" x2="400" y2="600"/>
      <line x1="600" y1="0" x2="600" y2="600"/>
    </g>
    
  </g>
</svg>