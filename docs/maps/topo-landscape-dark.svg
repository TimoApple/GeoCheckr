<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <clipPath id="bounds"><rect width="800" height="600" rx="12"/></clipPath>
  </defs>
  
  <!-- Background — dark like the app -->
  <rect width="800" height="600" rx="12" fill="#111225"/>
