      <ellipse cx="600" cy="200" rx="100" ry="60"/>
      <ellipse cx="350" cy="450" rx="120" ry="70"/>
      <ellipse cx="700" cy="480" rx="70" ry="45"/>
      <ellipse cx="100" cy="380" rx="60" ry="40"/>
      <ellipse cx="450" cy="120" rx="50" ry="35"/>
    </g>
    
    <!-- Lakes -->
    <path d="M320,280 C340,260 380,255 400,270 C420,285 430,310 415,330 C400,350 370,355 345,340 C320,325 305,300 320,280Z" 
          fill="#1a3a5c" opacity="0.7" stroke="#2a5a8c" stroke-width="1"/>
    <path d="M580,380 C595,370 620,372 630,385 C640,398 635,415 620,420 C605,425 590,418 582,405 C574,392 570,385 580,380Z" 
          fill="#1a3a5c" opacity="0.6" stroke="#2a5a8c" stroke-width="0.8"/>
    <ellipse cx="200" cy="500" rx="30" ry="18" fill="#1a3a5c" opacity="0.5" stroke="#2a5a8c" stroke-width="0.6"/>
    
    <!-- Rivers -->
    <g stroke="#2a5a8c" fill="none" stroke-linecap="round">
      <path d="M0,250 C80,240 150,260 200,245 C250,230 300,250 320,280" stroke-width="2.5" opacity="0.6"/>
      <path d="M320,280 C330,300 310,320 300,350 C290,380 310,420 340,450 C370,480 400,510 380,560 C360,590 340,600 340,600" stroke-width="2" opacity="0.5"/>
      <path d="M630,385 C650,400 660,430 680,450 C700,470 750,500 800,520" stroke-width="1.5" opacity="0.4"/>
      <path d="M200,500 C220,520 250,530 280,550 C310,570 340,590 340,600" stroke-width="1" opacity="0.35"/>
      <path d="M120,180 C140,200 160,220 200,245" stroke-width="1" opacity="0.35"/>
      <path d="M400,150 C380,180 360,210 320,280" stroke-width="1.2" opacity="0.35"/>
    </g>
    
    <!-- ═══ CONTOUR LINES (dark version) ═══ -->
    
    <!-- Low elevation -->
    <g stroke="#2a2a3a" fill="none" stroke-width="0.8" opacity="0.6">
      <path d="M0,480 C100,470 200,490 300,475 S500,495 600,480 S750,500 800,490"/>
      <path d="M0,510 C120,500 250,520 350,505 S500,525 650,510 S750,530 800,520"/>
      <path d="M0,540 C80,530 200,550 320,535 S480,555 620,540 S750,555 800,548"/>
    </g>
    
    <!-- Mid elevation -->
    <g stroke="#3a3a4a" fill="none" stroke-width="1" opacity="0.5">
      <path d="M0,400 C60,385 150,410 250,390 C350,370 420,400 500,385 C580,370 660,395 740,380 C780,372 800,378 800,378"/>
      <path d="M0,430 C70,415 160,440 260,420 C360,400 430,430 510,415 C590,400 670,425 750,410 C790,402 800,408 800,408"/>
      <path d="M0,455 C90,440 180,465 280,448 C380,430 450,458 530,443 C610,428 690,450 770,438"/>
      <path d="M50,300 C100,285 180,310 260,290 C340,270 400,300 480,285 C560,270 630,295 700,280 C740,272 780,285 800,278"/>
      <path d="M0,340 C80,325 170,350 270,330 C370,310 440,340 520,325 C600,310 680,335 760,320 C790,312 800,318 800,318"/>
    </g>
    
    <!-- High elevation -->
    <g stroke="#4a3a2a" fill="none" stroke-width="1.2" opacity="0.45">
      <path d="M100,200 C160,180 240,210 320,185 C400,160 460,195 540,175 C620,155 680,180 740,165"/>
      <path d="M50,240 C120,220 200,250 290,225 C380,200 440,235 520,215 C600,195 660,220 740,205 C780,197 800,205 800,205"/>
      <path d="M0,270 C70,255 160,280 250,260 C340,240 410,270 490,255 C570,240 650,265 730,250 C770,242 800,250 800,250"/>
      <path d="M150,150 C220,130 300,160 380,135 C460,110 520,145 600,125 C660,108 720,130 780,118"/>
    </g>
    
    <!-- Peak area -->
    <g stroke="#5a3a1a" fill="none" stroke-width="1.5" opacity="0.35">
      <path d="M200,100 C270,75 350,110 430,80 C510,50 570,90 640,65"/>
      <path d="M180,130 C250,108 330,140 410,112 C490,84 550,120 630,95 C670,82 710,100 740,90"/>
      <path d="M250,65 C310,45 380,75 450,50 C520,25 570,55 630,38"/>
    </g>
    
    <!-- ═══ ROADS (dark version — light lines) ═══ -->
    <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0,350 C100,340 200,360 300,340 C400,320 500,350 600,335 C700,320 800,340 800,340" stroke-width="3" opacity="0.15"/>
      <path d="M400,0 C390,80 410,160 400,250 C390,340 410,420 400,500 C390,560 400,600 400,600" stroke-width="2.5" opacity="0.12"/>
      <path d="M150,0 C160,100 140,200 160,300 C180,400 150,500 170,600" stroke-width="1.5" opacity="0.08"/>
      <path d="M600,0 C590,100 610,200 595,300 C580,400 600,500 590,600" stroke-width="1.5" opacity="0.08"/>
      <path d="M0,200 C60,190 120,210 180,195" stroke-width="1" opacity="0.06" stroke-dasharray="4,3"/>
      <path d="M650,150 C700,140 750,160 800,150" stroke-width="1" opacity="0.06" stroke-dasharray="4,3"/>
    </g>
    
    <!-- ═══ BUILDINGS (dark version) ═══ -->
    <g fill="#2a2a3a" opacity="0.5">
      <rect x="380" y="330" width="12" height="10" rx="1"/>
      <rect x="398" y="328" width="8" height="8" rx="1"/>
      <rect x="410" y="332" width="10" height="12" rx="1"/>
      <rect x="375" y="342" width="14" height="8" rx="1"/>
      <rect x="150" y="340" width="10" height="8" rx="1"/>
      <rect x="165" y="338" width="12" height="10" rx="1"/>
      <rect x="145" y="350" width="8" height="8" rx="1"/>
      <rect x="550" y="325" width="8" height="8" rx="1"/>
      <rect x="250" y="470" width="10" height="8" rx="1"/>
      <rect x="650" y="400" width="8" height="10" rx="1"/>
    </g>
    
    <!-- ═══ TREES (dark version) ═══ -->
    <g fill="#1a3a1a" opacity="0.6">
      <circle cx="170" cy="120" r="5"/>
      <circle cx="190" cy="135" r="4"/>
      <circle cx="155" cy="145" r="6"/>
      <circle cx="200" cy="115" r="4"/>
      <circle cx="590" cy="185" r="5"/>
      <circle cx="610" cy="200" r="6"/>
      <circle cx="575" cy="210" r="4"/>
      <circle cx="340" cy="430" r="5"/>
      <circle cx="360" cy="445" r="6"/>
      <circle cx="380" cy="435" r="4"/>
    </g>
    
    <!-- ═══ MARKER DOTS (GeoCheckr green!) ═══ -->
    <g>
      <circle cx="390" cy="340" r="6" fill="#a6d700" opacity="0.9"/>
      <circle cx="390" cy="340" r="12" fill="none" stroke="#a6d700" stroke-width="1.5" opacity="0.4"/>
      <circle cx="390" cy="340" r="18" fill="none" stroke="#a6d700" stroke-width="0.8" opacity="0.2"/>
      
      <circle cx="320" cy="285" r="5" fill="#a6d700" opacity="0.8"/>
      <circle cx="320" cy="285" r="10" fill="none" stroke="#a6d700" stroke-width="1.2" opacity="0.35"/>
      
      <circle cx="158" cy="345" r="4" fill="#a6d700" opacity="0.7"/>
      <circle cx="158" cy="345" r="8" fill="none" stroke="#a6d700" stroke-width="1" opacity="0.3"/>
    </g>
    
    <!-- Coordinate grid overlay -->
    <g stroke="#bdc2ff" stroke-width="0.3" opacity="0.04">
      <line x1="0" y1="150" x2="800" y2="150"/>
      <line x1="0" y1="300" x2="800" y2="300"/>
      <line x1="0" y1="450" x2="800" y2="450"/>
      <line x1="200" y1="0" x2="200" y2="600"/>
      <line x1="400" y1="0" x2="400" y2="600"/>
      <line x1="600" y1="0" x2="600" y2="600"/>
    </g>
    
  </g>
</svg>
