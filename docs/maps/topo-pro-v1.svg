<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0e1f"/>
      <stop offset="100%" stop-color="#111225"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#3340ca" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a6d700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3340ca" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds"><rect width="800" height="600" rx="0"/></clipPath>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  
  <g clip-path="url(#bounds)" opacity="1">
    
    <!-- Base terrain contour lines — flowing mountain ridges -->
    <g stroke="#bdc2ff" stroke-width="0.5" fill="none" opacity="0.06">
      <path d="M-50,580 Q100,550 200,520 T400,480 T600,500 T850,470"/>
      <path d="M-50,560 Q120,530 220,500 T420,460 T620,480 T850,450"/>
      <path d="M-50,540 Q140,510 240,480 T440,440 T640,460 T850,430"/>
      <path d="M-50,520 Q160,490 260,460 T460,420 T660,440 T850,410"/>
    </g>
    
    <!-- Mountain Range 1 — left side, large -->
    <g stroke="#3340ca" fill="none" opacity="0.12">
      <path d="M-20,300 Q80,280 150,320 Q200,350 280,300 Q340,260 400,290 Q440,310 480,280" stroke-width="1.2"/>
      <path d="M-10,320 Q90,300 160,340 Q210,370 290,320 Q350,280 410,310 Q450,330 490,300" stroke-width="1"/>
      <path d="M0,340 Q100,320 170,360 Q220,390 300,340 Q360,300 420,330 Q460,350 500,320" stroke-width="0.8"/>
      <path d="M10,360 Q110,340 180,380 Q230,410 310,360 Q370,320 430,350 Q470,370 510,340" stroke-width="0.6"/>
      <path d="M20,380 Q120,360 190,400 Q240,430 320,380 Q380,340 440,370 Q480,390 520,360" stroke-width="0.5"/>
      <path d="M30,400 Q130,380 200,420 Q250,450 330,400 Q390,360 450,390 Q490,410 530,380" stroke-width="0.4"/>
    </g>
    
    <!-- Mountain Range 2 — right side, medium -->
    <g stroke="#a6d700" fill="none" opacity="0.08">
      <path d="M500,200 Q560,180 620,220 Q660,250 720,210 Q760,180 820,200" stroke-width="1"/>
      <path d="M490,220 Q550,200 610,240 Q650,270 710,230 Q750,200 810,220" stroke-width="0.8"/>
      <path d="M480,240 Q540,220 600,260 Q640,290 700,250 Q740,220 800,240" stroke-width="0.6"/>
      <path d="M470,260 Q530,240 590,280 Q630,310 690,270 Q730,240 790,260" stroke-width="0.5"/>
      <path d="M460,280 Q520,260 580,300 Q620,330 680,290 Q720,260 780,280" stroke-width="0.4"/>
    </g>
    
    <!-- Central valley — deeper contours -->
    <g stroke="#bdc2ff" fill="none" opacity="0.1">
      <path d="M200,450 Q280,430 350,460 Q420,490 500,450 Q560,420 640,460" stroke-width="0.8"/>
      <path d="M190,470 Q270,450 340,480 Q410,510 490,470 Q550,440 630,480" stroke-width="0.6"/>
      <path d="M180,490 Q260,470 330,500 Q400,530 480,490 Q540,460 620,500" stroke-width="0.5"/>
      <path d="M170,510 Q250,490 320,520 Q390,550 470,510 Q530,480 610,520" stroke-width="0.4"/>
    </g>
    
    <!-- Ridge lines — sharp peaks -->
    <g stroke="#3340ca" fill="none" opacity="0.15">
      <path d="M300,100 L320,160 L340,120 L360,180 L380,140" stroke-width="1.5"/>
      <path d="M600,150 L620,200 L640,165 L660,220 L680,175" stroke-width="1.2"/>
      <path d="M150,200 L170,250 L190,210 L210,260" stroke-width="1"/>
    </g>
    
    <!-- Accent dots — mountain peaks -->
    <g fill="#a6d700" opacity="0.2">
      <circle cx="320" cy="155" r="3"/>
      <circle cx="620" cy="195" r="2.5"/>
      <circle cx="170" cy="245" r="2"/>
      <circle cx="450" cy="280" r="2.5"/>
      <circle cx="700" cy="200" r="2"/>
    </g>
    
    <!-- Highlight accent — green glow on central peak -->
    <g filter="url(#glow-filter)">
      <circle cx="400" cy="300" r="4" fill="#a6d700" opacity="0.3"/>
    </g>
    
    <!-- Fine coordinate grid -->
    <g stroke="#bdc2ff" stroke-width="0.2" opacity="0.04">
      <line x1="0" y1="100" x2="800" y2="100"/>
      <line x1="0" y1="200" x2="800" y2="200"/>
      <line x1="0" y1="300" x2="800" y2="300"/>
      <line x1="0" y1="400" x2="800" y2="400"/>
      <line x1="0" y1="500" x2="800" y2="500"/>
      <line x1="100" y1="0" x2="100" y2="600"/>
      <line x1="200" y1="0" x2="200" y2="600"/>
      <line x1="300" y1="0" x2="300" y2="600"/>
      <line x1="400" y1="0" x2="400" y2="600"/>
      <line x1="500" y1="0" x2="500" y2="600"/>
      <line x1="600" y1="0" x2="600" y2="600"/>
      <line x1="700" y1="0" x2="700" y2="600"/>
    </g>
    
  </g>
</svg>