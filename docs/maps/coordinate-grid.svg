<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#3340ca" stroke-width="0.5" opacity="0.08"/>
      <line x1="0" y1="40" x2="80" y2="40" stroke="#3340ca" stroke-width="0.3" opacity="0.05"/>
      <line x1="0" y1="0" x2="0" y2="80" stroke="#3340ca" stroke-width="0.5" opacity="0.08"/>
      <line x1="40" y1="0" x2="40" y2="80" stroke="#3340ca" stroke-width="0.3" opacity="0.05"/>
      <!-- Coordinate labels -->
      <text x="2" y="10" fill="#bdc2ff" font-size="5" opacity="0.08" font-family="monospace">52°N</text>
      <text x="42" y="10" fill="#bdc2ff" font-size="5" opacity="0.08" font-family="monospace">13°E</text>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#111225"/>
  <rect width="400" height="400" fill="url(#grid)"/>
</svg>
