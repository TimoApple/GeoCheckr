<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="streets" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Main roads -->
      <rect x="48" y="0" width="4" height="100" fill="#2a2b4a" opacity="0.4"/>
      <rect x="0" y="48" width="100" height="4" fill="#2a2b4a" opacity="0.4"/>
      <!-- Secondary streets -->
      <rect x="23" y="0" width="2" height="100" fill="#222340" opacity="0.3"/>
      <rect x="73" y="0" width="2" height="100" fill="#222340" opacity="0.3"/>
      <rect x="0" y="23" width="100" height="2" fill="#222340" opacity="0.3"/>
      <rect x="0" y="73" width="100" height="2" fill="#222340" opacity="0.3"/>
      <!-- Buildings / blocks -->
      <rect x="26" y="26" width="20" height="20" rx="2" fill="#1d1e32" opacity="0.5"/>
      <rect x="76" y="26" width="20" height="20" rx="2" fill="#1d1e32" opacity="0.5"/>
      <rect x="26" y="76" width="20" height="20" rx="2" fill="#1d1e32" opacity="0.5"/>
      <rect x="76" y="76" width="20" height="20" rx="2" fill="#1d1e32" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#111225"/>
  <rect width="400" height="400" fill="url(#streets)"/>
</svg>
