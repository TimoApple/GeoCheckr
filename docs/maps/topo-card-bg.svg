<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111225"/>
      <stop offset="100%" stop-color="#0d0e1f"/>
    </linearGradient>
    <clipPath id="card"><rect width="400" height="560" rx="16"/></clipPath>
  </defs>
  
  <!-- Card background -->
  <rect width="400" height="560" rx="16" fill="url(#card-bg)"/>
  
  <g clip-path="url(#card)">
    
    <!-- Topo pattern for card — city-themed contour lines -->
    
    <!-- Grid of city blocks (top-down view) -->
    <g stroke="#3340ca" fill="none" opacity="0.08">
      <!-- Main roads -->
      <line x1="0" y1="280" x2="400" y2="280" stroke-width="2"/>
      <line x1="200" y1="0" x2="200" y2="560" stroke-width="2"/>
      <line x1="0" y1="140" x2="400" y2="140" stroke-width="1"/>
      <line x1="0" y1="420" x2="400" y2="420" stroke-width="1"/>
      <line x1="100" y1="0" x2="100" y2="560" stroke-width="1"/>
      <line x1="300" y1="0" x2="300" y2="560" stroke-width="1"/>
    </g>
    
    <!-- City blocks as contour areas -->
    <g fill="#1d1e32" stroke="#bdc2ff" stroke-width="0.3" opacity="0.3">
      <rect x="20" y="20" width="60" height="100" rx="3"/>
      <rect x="120" y="20" width="60" height="100" rx="3"/>
      <rect x="220" y="20" width="60" height="100" rx="3"/>
      <rect x="320" y="20" width="60" height="100" rx="3"/>
      
      <rect x="20" y="160" width="60" height="100" rx="3"/>
      <rect x="120" y="160" width="60" height="100" rx="3"/>
      <rect x="220" y="160" width="60" height="100" rx="3"/>
      <rect x="320" y="160" width="60" height="100" rx="3"/>
      
      <rect x="20" y="300" width="60" height="100" rx="3"/>
      <rect x="120" y="300" width="60" height="100" rx="3"/>
      <rect x="220" y="300" width="60" height="100" rx="3"/>
      <rect x="320" y="300" width="60" height="100" rx="3"/>
      
      <rect x="20" y="440" width="60" height="100" rx="3"/>
      <rect x="120" y="440" width="60" height="100" rx="3"/>
      <rect x="220" y="440" width="60" height="100" rx="3"/>
      <rect x="320" y="440" width="60" height="100" rx="3"/>
    </g>
    
    <!-- Scattered building heights (contour rings) -->
    <g stroke="#a6d700" fill="none" opacity="0.12">
      <ellipse cx="50" cy="70" rx="15" ry="10" stroke-width="0.8"/>
      <ellipse cx="50" cy="70" rx="25" ry="18" stroke-width="0.5"/>
      <ellipse cx="150" cy="70" rx="10" ry="7" stroke-width="0.6"/>
      <ellipse cx="250" cy="70" rx="20" ry="14" stroke-width="0.8"/>
      <ellipse cx="250" cy="70" rx="30" ry="22" stroke-width="0.5"/>
      <ellipse cx="350" cy="70" rx="12" ry="8" stroke-width="0.6"/>
      
      <ellipse cx="50" cy="210" rx="18" ry="12" stroke-width="0.7"/>
      <ellipse cx="150" cy="210" rx="22" ry="15" stroke-width="0.9"/>
      <ellipse cx="150" cy="210" rx="32" ry="24" stroke-width="0.6"/>
      <ellipse cx="250" cy="210" rx="14" ry="10" stroke-width="0.6"/>
      <ellipse cx="350" cy="210" rx="18" ry="12" stroke-width="0.7"/>
      
      <ellipse cx="50" cy="350" rx="12" ry="8" stroke-width="0.5"/>
      <ellipse cx="150" cy="350" rx="16" ry="11" stroke-width="0.7"/>
      <ellipse cx="250" cy="350" rx="25" ry="17" stroke-width="0.8"/>
      <ellipse cx="250" cy="350" rx="35" ry="25" stroke-width="0.5"/>
      <ellipse cx="350" cy="350" rx="14" ry="10" stroke-width="0.6"/>
      
      <ellipse cx="50" cy="490" rx="20" ry="14" stroke-width="0.8"/>
      <ellipse cx="50" cy="490" rx="30" ry="22" stroke-width="0.5"/>
      <ellipse cx="150" cy="490" rx="10" ry="7" stroke-width="0.5"/>
      <ellipse cx="250" cy="490" rx="12" ry="8" stroke-width="0.6"/>
      <ellipse cx="350" cy="490" rx="18" ry="12" stroke-width="0.7"/>
    </g>
    
    <!-- Accent dots — tall buildings -->
    <g fill="#a6d700" opacity="0.2">
      <circle cx="50" cy="70" r="2"/>
      <circle cx="250" cy="70" r="2"/>
      <circle cx="150" cy="210" r="2"/>
      <circle cx="250" cy="350" r="2"/>
      <circle cx="50" cy="490" r="2"/>
    </g>
    
    <!-- Border glow -->
    <rect x="1" y="1" width="398" height="558" rx="15" fill="none" stroke="#3340ca" stroke-width="0.5" opacity="0.15"/>
    
  </g>
</svg>