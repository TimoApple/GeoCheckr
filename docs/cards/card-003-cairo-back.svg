<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="cardbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111225"/>
      <stop offset="100%" stop-color="#0d0e1f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="560" rx="16" fill="url(#cardbg)"/>
  <rect x="1" y="1" width="398" height="558" rx="15" fill="none" stroke="#3340ca" stroke-width="1" opacity="0.2"/>
  
  <!-- Topo background — dense contour lines -->
  <g stroke="#bdc2ff" fill="none" opacity="0.05">
    <path d="M-30,80 Q50,60 130,90 Q210,120 290,80 Q370,40 430,80" stroke-width="0.5"/>
    <path d="M-30,120 Q50,100 130,130 Q210,160 290,120 Q370,80 430,120" stroke-width="0.4"/>
    <path d="M-30,160 Q50,140 130,170 Q210,200 290,160 Q370,120 430,160" stroke-width="0.3"/>
    <path d="M-30,400 Q50,380 130,410 Q210,440 290,400 Q370,360 430,400" stroke-width="0.5"/>
    <path d="M-30,440 Q50,420 130,450 Q210,480 290,440 Q370,400 430,440" stroke-width="0.4"/>
    <path d="M-30,480 Q50,460 130,490 Q210,520 290,480 Q370,440 430,480" stroke-width="0.3"/>
  </g>
  
  <!-- GeoCheckr Logo -->
  <text x="200" y="60" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="700" fill="#a6d700" letter-spacing="3">GEOCHECKR</text>
  
  <!-- City name — ENGLISH (main) -->
  <text x="200" y="200" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="42" font-weight="700" fill="#a6d700">Cairo</text>
  
  <!-- Country -->
  <text x="200" y="240" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="18" font-weight="400" fill="#bdc2ff">Egypt</text>
  
  <!-- Divider -->
  <line x1="120" y1="270" x2="280" y2="270" stroke="#3340ca" stroke-width="1" opacity="0.3"/>
  
  <!-- Local name -->
  <text x="200" y="310" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="32" font-weight="600" fill="#e5e2e1">القاهرة</text>
  <text x="200" y="340" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" fill="#8f8fa0" letter-spacing="1">LOCAL NAME</text>
  
  <!-- Coordinates -->
  <g>
    <text x="200" y="400" text-anchor="middle" font-family="Space Grotesk, monospace" font-size="14" fill="#8f8fa0" letter-spacing="0.5">30.0444°N  31.2357°E</text>
  </g>
  
  <!-- ID badge -->
  <rect x="160" y="420" width="80" height="32" rx="16" fill="#3340ca" opacity="0.5"/>
  <text x="200" y="441" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700" fill="#fff">#003</text>
  
  <!-- Bottom -->
  <text x="200" y="530" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="10" fill="#8f8fa0" letter-spacing="2">QR CARD GAME</text>
</svg>