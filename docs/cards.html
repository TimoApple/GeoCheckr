<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoCheckr — QR Cards (Test)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="locations_db.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:#1a1a2e; color:#fff; padding:24px; }
    h1 { font-size:24px; font-weight:700; margin-bottom:4px; }
    .subtitle { color:#8E8E93; font-size:14px; margin-bottom:24px; }
    .controls { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .controls button { padding:12px 20px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-gen { background:#a6d700; color:#1a1a2e; }
    .btn-print { background:#007AFF; color:white; }
    .btn-shuffle { background:#2a2a4e; color:#fff; border:1px solid #3a3a5e !important; }
    .cards-grid { display:grid; grid-template-columns:repeat(6, 1fr); gap:10px; }
    .card { background:#0d0d1a; border:2px solid #2a2a4e; border-radius:12px; padding:14px 10px; text-align:center; page-break-inside:avoid; }
    .card-num { font-size:28px; font-weight:700; color:#a6d700; line-height:1; }
    .card-qr { margin:8px auto; display:flex; justify-content:center; }
    .card-id { font-size:10px; color:#555; font-family:monospace; margin-top:4px; }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .count { color:#8E8E93; font-size:13px; margin-bottom:16px; }

    /* === CITY CARDS (separate page) === */
    .city-section { margin-top:40px; page-break-before:always; }
    .city-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; }
    .city-card { background:#0d0d1a; border:2px solid #3a3a5e; border-radius:16px; padding:24px; text-align:center; page-break-inside:avoid; }
    .city-name { font-size:24px; font-weight:700; color:#fff; margin-bottom:4px; }
    .city-country { font-size:14px; color:#8E8E93; }
    .city-label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.1em; margin-top:12px; }

    @media print {
      body { background:#fff; color:#000; padding:12px; }
      .controls { display:none; }
      .card { border-color:#ccc; background:#fff; }
      .card-num { color:#000; }
      .card-id { color:#999; }
      .city-card { border-color:#ccc; background:#fff; }
      .city-name { color:#000; }
      .city-country { color:#666; }
      .subtitle, .count { color:#666; }
      h1 { color:#000; }
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a6d700" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="20" y1="14" x2="20" y2="20"/><line x1="14" y1="20" x2="20" y2="20"/></svg>
    <h1>GeoCheckr — QR Cards</h1>
  </div>
  <p class="subtitle">Scan mit der App → Street View → errate die Stadt.</p>
  
  <div class="controls">
    <button class="btn-shuffle" onclick="generate()">🔄 Shuffle</button>
    <button class="btn-print" onclick="window.print()">🖨️ Print</button>
  </div>
  
  <div class="count" id="count"></div>
  
  <!-- QR CARDS (Deck — verdeckt, zum Ziehen) -->
  <div class="cards-grid" id="qr-grid"></div>
  
  <!-- CITY CARDS (jeder Spieler kriegt eine) -->
  <div class="city-section">
    <h1 style="margin-bottom:4px;">City Cards</h1>
    <p class="subtitle">Jeder Spieler kriegt EINE Karte. Legt sie offen auf den Tisch.</p>
    <div class="city-grid" id="city-grid"></div>
  </div>
  
  <script>
    function generate() {
      const pool = [...ALL_LOCATIONS].map((l, i) => ({...l, id: i+1}));
      pool.sort(() => Math.random() - 0.5);
      const selected = pool.slice(0, 18);
      
      document.getElementById('count').textContent = selected.length + ' QR-Karten + ' + selected.length + ' Stadt-Karten';
      
      // QR CARDS
      const qrGrid = document.getElementById('qr-grid');
      qrGrid.innerHTML = '';
      selected.forEach((loc, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const num = i + 1;
        const url = 'https://timoapple.github.io/GeoCheckr/?loc=' + loc.id;
        
        card.innerHTML = `
          <div class="card-num">${num}</div>
          <div class="card-qr" id="qr-${loc.id}"></div>
          <div class="card-id">GC-${String(loc.id).padStart(3,'0')}</div>
        `;
        qrGrid.appendChild(card);
        
        QRCode.toCanvas(url, { width: 120, margin: 1, color: { dark: '#000', light: '#fff' } }, (err, canvas) => {
          if (!err) document.getElementById('qr-' + loc.id).appendChild(canvas);
        });
      });
      
      // CITY CARDS
      const cityGrid = document.getElementById('city-grid');
      cityGrid.innerHTML = '';
      selected.forEach(loc => {
        const card = document.createElement('div');
        card.className = 'city-card';
        card.innerHTML = `
          <div class="city-name">${loc.city}</div>
          <div class="city-country">${loc.country}</div>
          <div class="city-label">City Card</div>
        `;
        cityGrid.appendChild(card);
      });
    }
    
    generate();
  </script>
</body>
</html>
