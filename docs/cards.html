<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoCheckr — Print QR Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="locations_db.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:#F9F9F9; color:#1C1C1E; padding:24px; }
    h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
    .subtitle { color:#8E8E93; margin-bottom:24px; }
    .controls { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
    .controls button { padding:12px 20px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-gen { background:#34C759; color:white; }
    .btn-print { background:#007AFF; color:white; }
    .controls select { padding:12px 16px; border-radius:12px; border:1.5px solid #E5E5EA; font-family:inherit; font-size:14px; }
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }
    .card { background:white; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); text-align:center; page-break-inside:avoid; }
    .card-city { font-size:18px; font-weight:700; margin-bottom:4px; }
    .card-country { font-size:13px; color:#8E8E93; margin-bottom:12px; }
    .card-qr { margin:0 auto 8px; }
    .card-code { font-size:11px; color:#8E8E93; font-family:monospace; }
    .card-diff { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:8px; }
    .diff-leicht { background:#E8F8EC; color:#34C759; }
    .diff-mittel { background:#FFF3E0; color:#FF9500; }
    .diff-schwer { background:#FFE8E8; color:#FF3B30; }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .header-icon { width:40px; height:40px; border-radius:10px; background:#F3E8FF; display:flex; align-items:center; justify-content:center; }
    @media print {
      body { background:white; padding:12px; }
      .controls { display:none; }
      .cards-grid { gap:12px; }
      .card { box-shadow:none; border:1px solid #E5E5EA; border-radius:12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#AF52DE" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
    </div>
    <h1>GeoCheckr Cards</h1>
  </div>
  <p class="subtitle">Print QR cards for the physical game. Scan with your phone to start each round.</p>
  
  <div class="controls">
    <select id="region-filter">
      <option value="all">All Regions</option>
      <option value="EU">Europe</option>
      <option value="ASIA">Asia</option>
      <option value="NA">North America</option>
      <option value="SA">South America</option>
      <option value="AF">Africa</option>
      <option value="OC">Oceania</option>
    </select>
    <select id="diff-filter">
      <option value="all">All Difficulties</option>
      <option value="leicht">Easy</option>
      <option value="mittel">Medium</option>
      <option value="schwer">Hard</option>
    </select>
    <select id="count-select">
      <option value="10">10 Cards</option>
      <option value="20">20 Cards</option>
      <option value="30" selected>30 Cards</option>
      <option value="50">50 Cards</option>
      <option value="all">All Cards</option>
    </select>
    <button class="btn-gen" onclick="generateCards()">Generate</button>
    <button class="btn-print" onclick="window.print()">Print</button>
  </div>
  
  <div class="cards-grid" id="cards-grid"></div>
  
  <script>
    function generateCards() {
      const region = document.getElementById('region-filter').value;
      const diff = document.getElementById('diff-filter').value;
      const count = document.getElementById('count-select').value;
      
      let pool = ALL_LOCATIONS.map((l, i) => ({...l, id: i+1}));
      if (region !== 'all') pool = pool.filter(l => l.region === region);
      if (diff !== 'all') pool = pool.filter(l => l.difficulty === diff);
      
      // Shuffle
      pool.sort(() => Math.random() - 0.5);
      if (count !== 'all') pool = pool.slice(0, parseInt(count));
      
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';
      
      pool.forEach(loc => {
        const card = document.createElement('div');
        card.className = 'card';
        const qrDiv = document.createElement('div');
        qrDiv.className = 'card-qr';
        
        const code = 'https://timoapple.github.io/GeoCheckr/?loc=' + loc.id;
        const shortCode = 'GC-' + String(loc.id).padStart(3, '0');
        
        card.innerHTML = `
          <div class="card-city">${loc.city}</div>
          <div class="card-country">${loc.country}</div>
          <div class="card-qr" id="qr-${loc.id}"></div>
          <div class="card-code">${shortCode}</div>
          <span class="card-diff diff-${loc.difficulty}">${loc.difficulty === 'leicht' ? 'Easy' : loc.difficulty === 'mittel' ? 'Medium' : 'Hard'}</span>
        `;
        grid.appendChild(card);
        
        // Generate QR
        QRCode.toCanvas(code, { width: 160, margin: 1 }, (err, canvas) => {
          if (!err) document.getElementById('qr-' + loc.id).appendChild(canvas);
        });
      });
    }
    
    // Auto-generate on load
    generateCards();
  </script>
</body>
</html>
