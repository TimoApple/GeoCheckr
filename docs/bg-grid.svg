<!-- GeoCheckr Background SVG — Map Grid / City Blocks -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <rect width="1440" height="900" fill="#111225"/>
  <!-- Grid lines — map street feel -->
  <g stroke="#3340ca" stroke-width="0.8" opacity="0.05">
    <!-- Horizontal streets -->
    <line x1="0" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="360" x2="1440" y2="360"/>
    <line x1="0" y1="480" x2="1440" y2="480"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="0" y1="840" x2="1440" y2="840"/>
    <!-- Vertical streets -->
    <line x1="160" y1="0" x2="160" y2="900"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>
  <!-- Diagonal avenue -->
  <g stroke="#bdc2ff" stroke-width="1.2" opacity="0.04">
    <line x1="-100" y1="0" x2="1540" y2="900"/>
    <line x1="0" y1="800" x2="1440" y2="100"/>
  </g>
  <!-- City blocks (filled rectangles) -->
  <g fill="#3340ca" opacity="0.03">
    <rect x="165" y="125" width="150" height="110" rx="4"/>
    <rect x="485" y="245" width="150" height="110" rx="4"/>
    <rect x="805" y="365" width="150" height="110" rx="4"/>
    <rect x="325" y="485" width="150" height="110" rx="4"/>
    <rect x="965" y="605" width="150" height="110" rx="4"/>
    <rect x="645" y="725" width="150" height="110" rx="4"/>
  </g>
  <!-- Map pins -->
  <g fill="#a6d700" opacity="0.15">
    <circle cx="240" cy="180" r="6"/>
    <circle cx="560" cy="300" r="5"/>
    <circle cx="880" cy="420" r="7"/>
    <circle cx="400" cy="540" r="4"/>
    <circle cx="1040" cy="660" r="6"/>
    <circle cx="720" cy="780" r="5"/>
  </g>
</svg>
