<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GeoCheckr</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111225">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=11">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="locations_db.js"></script>
  <script src="game.js?v=11"></script>
  <script>
    // Alle externen Skripte async laden
    function loadAsync(src) {
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      document.head.appendChild(s);
      return s;
    }
    loadAsync('https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js');
    var g = loadAsync('https://maps.googleapis.com/maps/api/js?key=AIzaSyCl3ogHqguF1QcwhyHdvJmUkbgx3bpKLJI&libraries=streetView&callback=__gmapsLoaded');
    g.onerror = function() { console.warn('Maps API failed'); };
    window.__gmapsLoaded = function() { console.log('Maps API ready'); };
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:#111225; color:#fff; min-height:100vh; overflow-x:hidden; }
    #app { min-height:100vh; }
    .input { width:100%; background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; color:#fff; font-size:15px; font-family:inherit; outline:none; transition:border-color 0.2s; }
    .input:focus { border-color:#a6d700; }
    .input::placeholder { color:#555; }
    .btn { padding:14px 24px; border-radius:14px; border:none; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
    .btn-primary { background:#a6d700; color:#111225; }
    .btn-primary:active { transform:scale(0.97); }
    .btn-ghost { background:transparent; color:#8E8E93; border:1px solid rgba(255,255,255,0.1); }
    .btn-lg { padding:16px 28px; font-size:16px; border-radius:16px; }
    .diff-btn { padding:10px 16px; border-radius:10px; border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:#8E8E93; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; transition:all 0.2s; }
    .diff-btn.active { background:rgba(166,215,0,0.15); border-color:#a6d700; color:#a6d700; }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111225;">
      <div style="text-align:center;">
        <div style="width:48px;height:48px;border-radius:12px;background:rgba(166,215,0,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a6d700" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
        </div>
        <p style="color:#8E8E93;font-size:14px;">Lädt...</p>
      </div>
    </div>
  </div>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
