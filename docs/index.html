<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>GeoCheckr — Find the Place!</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#34C759">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=9">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="locations_db.js"></script>
  <script src="game.js?v=9"></script>
  <script>
    // Load Google Maps async — don't block UI
    var gmapsScript = document.createElement('script');
    gmapsScript.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCl3ogHqguF1QcwhyHdvJmUkbgx3bpKLJI&libraries=streetView&callback=__gmapsLoaded';
    gmapsScript.async = true;
    gmapsScript.onerror = function() { console.warn('Google Maps API failed to load'); };
    window.__gmapsLoaded = function() { console.log('Maps API ready'); };
    document.head.appendChild(gmapsScript);
  </script>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Space Grotesk,sans-serif;background:#F9F9F9;">
      <div style="text-align:center;">
        <div style="width:48px;height:48px;border-radius:12px;background:#F3E8FF;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#AF52DE" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
        </div>
        <p style="color:#8E8E93;font-size:14px;">Loading...</p>
      </div>
    </div>
  </div>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
