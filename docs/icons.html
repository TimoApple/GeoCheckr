<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoCheckr — Icon Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111225; --surface: #1d1e32; --surface-high: #27283c;
      --accent: #bdc2ff; --green: #a6d700; --blue: #3340ca;
      --text: #e5e2e1; --text-dim: #5d5c6f;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); padding:32px; }
    h1 { font-size:28px; font-weight:700; margin-bottom:8px; }
    .subtitle { color:var(--text-dim); font-size:14px; margin-bottom:32px; }
    .category { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.1rem; color:var(--accent); margin:24px 0 12px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:12px; }
    .icon-card {
      background:var(--surface); border-radius:14px; padding:16px;
      display:flex; flex-direction:column; align-items:center; gap:8px;
      transition:all 0.2s; cursor:pointer;
    }
    .icon-card:hover { background:var(--surface-high); transform:translateY(-2px); }
    .icon-card svg { width:24px; height:24px; stroke:var(--accent); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .icon-card .name { font-size:10px; color:var(--text-dim); text-align:center; word-break:break-all; }
    .icon-card.green svg { stroke:var(--green); }
    .badge { display:inline-block; background:rgba(166,215,0,0.12); color:var(--green); padding:4px 12px; border-radius:9999px; font-size:12px; font-weight:600; margin-bottom:24px; }
  </style>
</head>
<body>
  <h1>GeoCheckr — Icon Library</h1>
  <p class="subtitle">Tabler Icons (MIT) — 106 Icons für GeoCheckr</p>
  <span class="badge" id="count"></span>
  
  <div id="icons"></div>
  
  <script>
    const CATEGORIES = {
      'Map & Geography': ['map','map-2','map-pin','map-search','map-route','compass','navigation','world','world-download','world-upload','route','route-2','route-alt-left','route-alt-right','current-location','location','location-filled','flag','flag-2','flag-3','building','building-arch','building-skyscraper','mountain','trees','sunrise','sunset','plane','plane-arrival','plane-departure','ship','car','walk'],
      'Game & Play': ['play','pause','skip-forward','skip-back','clock','timer','alarm','trophy','medal','award','star','qrcode','camera','scan'],
      'Players & Social': ['users','user','user-plus','user-minus','heart','thumb-up','message','bell','mail'],
      'Navigation & UI': ['search','settings','info-circle','help-circle','check','x','arrow-right','arrow-left','arrow-up','arrow-down','chevron-right','chevron-left','menu','dots-vertical','adjustments','home','login','logout'],
      'Media & Audio': ['volume','volume-2','volume-3','photo','video','wifi','signal-l','bluetooth'],
      'Actions': ['refresh','reload','rotate','share','download','upload','copy','clipboard','eye','eye-off','calendar','clock-2'],
      'Decorative': ['globe','sphere','radius','circle','hexagon','polygon','topology','chart-grid-dots','layout-grid','layout-list','grid-dots','grid-3x3'],
    };
    
    const container = document.getElementById('icons');
    let total = 0;
    
    for (const [cat, icons] of Object.entries(CATEGORIES)) {
      let html = `<p class="category">${cat}</p><div class="grid">`;
      for (const icon of icons) {
        html += `<div class="icon-card" title="${icon}">
          <svg><use href="icons/${icon}.svg#tabler-${icon}"/></svg>
          <span class="name">${icon}</span>
        </div>`;
        total++;
      }
      html += '</div>';
      container.innerHTML += html;
    }
    
    document.getElementById('count').textContent = total + ' Icons';
    
    // Fallback: load SVGs inline if <use> doesn't work
    document.querySelectorAll('.icon-card').forEach(async (card) => {
      const name = card.title;
      try {
        const resp = await fetch('icons/' + name + '.svg');
        const text = await resp.text();
        const svgEl = card.querySelector('svg');
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'image/svg+xml');
        const svg = doc.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '24');
          svg.setAttribute('height', '24');
          svg.setAttribute('stroke', getComputedStyle(card).getPropertyValue('stroke') || '#bdc2ff');
          svg.removeAttribute('class');
          svgEl.replaceWith(svg);
        }
      } catch(e) {}
    });
  </script>
</body>
</html>
