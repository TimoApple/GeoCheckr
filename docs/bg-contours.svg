<!-- GeoCheckr Background SVG — Topographic Contour Lines -->
<!-- Usage: body background or CSS mask -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111225"/>
      <stop offset="100%" stop-color="#111225"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#fade)"/>
  <!-- Contour lines — topographic style -->
  <g stroke="#bdc2ff" stroke-width="0.5" fill="none" opacity="0.06">
    <path d="M-50,200 C200,180 400,250 720,220 S1100,280 1500,200"/>
    <path d="M-50,260 C180,240 450,310 720,280 S1050,340 1500,260"/>
    <path d="M-50,320 C220,300 380,370 720,340 S1120,400 1500,320"/>
    <path d="M-50,380 C160,360 500,430 720,400 S1080,460 1500,380"/>
    <path d="M-50,440 C240,420 420,490 720,460 S1000,520 1500,440"/>
    <path d="M-50,500 C200,480 460,550 720,520 S1140,580 1500,500"/>
    <path d="M-50,560 C180,540 380,610 720,580 S1060,640 1500,560"/>
    <path d="M-50,620 C260,600 440,670 720,640 S1020,700 1500,620"/>
    <path d="M-50,680 C200,660 500,730 720,700 S1100,760 1500,680"/>
    <path d="M-50,740 C240,720 400,790 720,760 S1080,820 1500,740"/>
  </g>
  <!-- Latitude grid lines -->
  <g stroke="#bdc2ff" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="100" x2="1440" y2="100"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="500" x2="1440" y2="500"/>
    <line x1="0" y1="700" x2="1440" y2="700"/>
  </g>
  <!-- Longitude grid lines -->
  <g stroke="#bdc2ff" stroke-width="0.3" opacity="0.04">
    <line x1="240" y1="0" x2="240" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Scattered location dots -->
  <g fill="#a6d700" opacity="0.12">
    <circle cx="200" cy="250" r="4"/>
    <circle cx="720" cy="400" r="3"/>
    <circle cx="1100" cy="300" r="5"/>
    <circle cx="400" cy="600" r="3"/>
    <circle cx="900" cy="700" r="4"/>
    <circle cx="300" cy="450" r="2"/>
    <circle cx="1000" cy="550" r="3"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="1300" cy="650" r="3"/>
  </g>
</svg>
