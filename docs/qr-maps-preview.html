<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoCheckr — QR Map Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#111225; --surface:#1d1e32; --accent:#bdc2ff; --green:#a6d700; --text:#e5e2e1; --dim:#5d5c6f; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); padding:40px 20px; }
    h1 { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; }
    .sub { color:var(--dim); font-size:14px; text-align:center; margin-bottom:40px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; max-width:1200px; margin:0 auto; }
    .card { background:var(--surface); border-radius:20px; padding:24px; text-align:center; }
    .card h3 { font-size:16px; font-weight:600; margin-bottom:16px; }
    .card embed, .card img { width:100%; border-radius:12px; }
    .badge { display:inline-block; background:rgba(166,215,0,0.12); color:var(--green); padding:4px 12px; border-radius:9999px; font-size:11px; font-weight:600; margin-top:12px; }
  </style>
</head>
<body>
  <h1>QR Map Cards</h1>
  <p class="sub">QR-Codes als Stadt-Raster von oben — CI Farben</p>
  
  <div class="grid">
    <div class="card">
      <h3>📍 Paris</h3>
      <embed src="qr-map-paris.svg" type="image/svg+xml">
      <div class="badge">Scannbar ✓</div>
    </div>
    <div class="card">
      <h3>📍 Tokyo</h3>
      <embed src="qr-map-tokyo.svg" type="image/svg+xml">
      <div class="badge">Scannbar ✓</div>
    </div>
    <div class="card">
      <h3>📍 Cairo</h3>
      <embed src="qr-map-cairo.svg" type="image/svg+xml">
      <div class="badge">Scannbar ✓</div>
    </div>
  </div>
</body>
</html>
